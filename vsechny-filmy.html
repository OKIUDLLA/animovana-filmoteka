<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Filmotéka PLUS – databáze všech filmů (Wikidata + Wikipedia): hledání, filtry, plakáty, obsazení a popis. Bez registrace.">
<title>Filmotéka PLUS — všechny filmy</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%9E%EF%B8%8F%3C/text%3E%3C/svg%3E">
<style>
:root{--bg:#0c1018;--bg2:#121826;--card:#161d2e;--card2:#1c2538;--line:#262f44;--tx:#e7ecf5;--mut:#8c98b3;--acc:#ffb703;--acc2:#fb8500;--good:#2ec27e;--ok:#f4a623;--bad:#e5484d;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:radial-gradient(1200px 600px at 80% -10%,#1a2138 0,var(--bg) 55%);color:var(--tx);min-height:100vh}
a{color:var(--acc);text-decoration:none}a:hover{text-decoration:underline}
.wrap{max-width:1320px;margin:0 auto;padding:22px 18px 70px}
.logo{font-size:26px;font-weight:800;background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}
.logo span{font-size:13px;color:var(--mut);-webkit-text-fill-color:var(--mut)}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.mini{font-size:12px;color:var(--mut)}
.controls{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--bg) 80%,transparent);padding:12px 0 12px;backdrop-filter:blur(5px);margin-top:10px}
input[type=text],select{background:var(--card);border:1px solid var(--line);color:var(--tx);border-radius:10px;padding:11px 13px;font-size:14px;outline:none}
input[type=text]{width:100%}input:focus,select:focus{border-color:var(--acc)}select{cursor:pointer}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.btn{background:linear-gradient(90deg,var(--acc),var(--acc2));border:none;color:#1a1205;font-weight:700;padding:11px 18px;border-radius:10px;cursor:pointer;font-size:14px}
.btn.sec{background:var(--card2);color:var(--tx);border:1px solid var(--line)}
.count{color:var(--mut);font-size:13px;margin:8px 2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:.15s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);border-color:var(--acc);box-shadow:0 12px 32px rgba(0,0,0,.45)}
.poster{position:relative;aspect-ratio:2/3;background:linear-gradient(160deg,#2c3e50,#1a2138);display:flex;align-items:center;justify-content:center;overflow:hidden}
.poster img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s}.poster img.on{opacity:1}
.poster .ph{font-size:40px;opacity:.45;z-index:0}
.cbody{padding:10px 12px 12px}.ct{font-weight:700;font-size:14px;line-height:1.2}.cy{color:var(--mut);font-size:12px;margin-top:4px}
.more{text-align:center;margin:22px 0}
.empty{text-align:center;color:var(--mut);padding:50px 16px;line-height:1.6}
.loading{text-align:center;color:var(--mut);padding:30px}
footer{color:var(--mut);font-size:12px;text-align:center;margin-top:36px;line-height:1.6}
.ov{position:fixed;inset:0;background:rgba(4,7,12,.8);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:24px 16px;backdrop-filter:blur(4px);overflow:auto}
.ov.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--line);border-radius:18px;max-width:820px;width:100%;overflow:hidden}
.mtop{display:flex;flex-wrap:wrap}.mp{width:250px;aspect-ratio:2/3;flex-shrink:0;background:#0c1018;display:flex;align-items:center;justify-content:center;overflow:hidden}
.mp img{width:100%;height:100%;object-fit:cover}.mp .ph{font-size:60px;opacity:.5}
.mhead{flex:1;min-width:280px;padding:22px;position:relative}
.close{position:absolute;top:12px;right:14px;background:rgba(12,16,24,.7);border:1px solid var(--line);color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;z-index:5}
.mt{font-size:24px;font-weight:800;padding-right:40px}.morig{color:var(--mut);font-style:italic;margin:4px 0 12px}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}.chip{background:var(--card2);border:1px solid var(--line);font-size:11px;padding:4px 9px;border-radius:14px}
.kv{font-size:14px;line-height:1.7}.kv .k{color:var(--mut)}
.mbody{padding:0 22px 22px}
.desc{background:var(--card);border-left:3px solid var(--acc);border-radius:8px;padding:12px 14px;line-height:1.55;font-size:14px;margin:14px 0}
.sec-t{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.cast{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:10px}
.actor{text-align:center}.actor .ap{width:100%;aspect-ratio:2/3;border-radius:10px;object-fit:cover;background:var(--card2);border:1px solid var(--line)}
.actor .an{font-size:12px;font-weight:600;margin-top:5px;line-height:1.2}.actor .ac{font-size:11px;color:var(--mut);line-height:1.2}
.links{display:flex;flex-wrap:wrap;gap:8px}.lnk{background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--tx)}.lnk:hover{border-color:var(--acc);text-decoration:none}
@media(max-width:560px){.mp{width:100%;aspect-ratio:16/9}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo">🎞️ Filmotéka PLUS <span>· všechny filmy · bez registrace</span></div>
    <div class="mini"><a href="index.html">← Animovaná filmotéka</a></div>
  </div>
  <div class="controls">
    <input type="text" id="q" placeholder="🔍 Hledej jakýkoli film (např. Matrix, Forrest Gump, Avatar…)">
    <div class="filters">
      <select id="fgenre"></select>
      <select id="fdecade"></select>
      <select id="fsort">
        <option value="links">Řadit: nejznámější</option>
        <option value="new">Řadit: nejnovější</option>
        <option value="old">Řadit: nejstarší</option>
      </select>
      <button class="btn sec" id="reset">Vyčistit</button>
    </div>
  </div>
  <div class="count" id="count"></div>
  <div class="loading" id="loading" style="display:none">Načítám z Wikidaty…</div>
  <div class="grid" id="grid"></div>
  <div class="more" id="moreWrap" style="display:none"><button class="btn sec" id="moreBtn">Načíst další</button></div>
  <div class="empty" id="empty" style="display:none"></div>
  <footer>Data: <a href="https://www.wikidata.org" target="_blank" rel="noopener">Wikidata</a> · plakáty a popisy: <a href="https://www.wikipedia.org" target="_blank" rel="noopener">Wikipedia</a>. Bez registrace a klíče. Hodnocení přes odkazy na ČSFD/Kinobox/IMDb.</footer>
</div>
<div class="ov" id="ov"><div class="modal" id="modal"></div></div>

<script>
const WDQS='https://query.wikidata.org/sparql', el=id=>document.getElementById(id);
const GENRES=[['','Žánr (vše)'],['Q202866','Animovaný'],['Q157443','Komedie'],['Q130232','Drama'],['Q188473','Akční'],['Q471839','Sci-fi'],['Q157394','Fantasy'],['Q200092','Horor'],['Q2484376','Thriller'],['Q1054574','Romantický'],['Q319221','Dobrodružný'],['Q959790','Krimi'],['Q93204','Dokumentární'],['Q842256','Drama (válečný)']];
let state={page:0,perPage:30,items:[],seen:{}};

el('fgenre').innerHTML=GENRES.map(g=>`<option value="${g[0]}">${g[1]}</option>`).join('');
(function(){let h='<option value="">Dekáda (vše)</option>';for(let y=2020;y>=1920;y-=10)h+=`<option value="${y}">${y}s</option>`;el('fdecade').innerHTML=h;})();

function sparql(q){return fetch(WDQS+'?format=json&query='+encodeURIComponent(q),{headers:{'Accept':'application/sparql-results+json'}}).then(r=>{if(!r.ok)throw new Error('WDQS '+r.status);return r.json();});}
function esc(s){return (s||'').replace(/[\\"]/g,' ');}

function buildQuery(){
  const q=el('q').value.trim(), g=el('fgenre').value, dec=el('fdecade').value, sort=el('fsort').value;
  const off=state.page*state.perPage;
  let head, where='';
  if(q){
    head=`SERVICE wikibase:mwapi { bd:serviceParam wikibase:api "EntitySearch". bd:serviceParam wikibase:endpoint "www.wikidata.org". bd:serviceParam mwapi:search "${esc(q)}". bd:serviceParam mwapi:language "cs". bd:serviceParam mwapi:limit "60". ?film wikibase:apiOutputItem mwapi:item. } ?film wdt:P31/wdt:P279* wd:Q11424 .`;
  }else{
    head=`?film wdt:P31 wd:Q11424 ; wikibase:sitelinks ?ls . ?film wdt:P577 ?dd . BIND(YEAR(?dd) AS ?fy) FILTER(?ls > ${g?6:55})`;
  }
  if(g) where+=` ?film wdt:P136 wd:${g} .`;
  if(dec) where+=` ?film wdt:P577 ?dx . FILTER(YEAR(?dx)>=${dec} && YEAR(?dx)<=${(+dec+9)}) .`;
  const order = sort==='new' ? 'DESC(?year)' : sort==='old' ? 'ASC(?year)' : (q?'DESC(?links)':'DESC(?links)');
  const lim = q ? 60 : state.perPage;
  const offClause = q ? '' : (' OFFSET '+off);
  return `SELECT ?film (SAMPLE(?labCs) AS ?lc) (SAMPLE(?labEn) AS ?le) (SAMPLE(?csN) AS ?cn) (SAMPLE(?enN) AS ?en) (SAMPLE(?y) AS ?year) (SAMPLE(?imdb) AS ?imdbid) (SAMPLE(?img) AS ?img) (MAX(?lsx) AS ?links) WHERE {
    ${head} ${where}
    OPTIONAL { ?film rdfs:label ?labCs. FILTER(LANG(?labCs)="cs") }
    OPTIONAL { ?film rdfs:label ?labEn. FILTER(LANG(?labEn)="en") }
    OPTIONAL { ?acs schema:about ?film; schema:isPartOf <https://cs.wikipedia.org/>; schema:name ?csN. }
    OPTIONAL { ?aen schema:about ?film; schema:isPartOf <https://en.wikipedia.org/>; schema:name ?enN. }
    OPTIONAL { ?film wdt:P577 ?d. BIND(YEAR(?d) AS ?y) }
    OPTIONAL { ?film wdt:P345 ?imdb. }
    OPTIONAL { ?film wdt:P18 ?img. }
    OPTIONAL { ?film wikibase:sitelinks ?lsx. }
  } GROUP BY ?film ORDER BY ${order} LIMIT ${lim}${offClause}`;
}

function commons(url,w){if(!url)return null;return url.replace('http://','https://')+'?width='+(w||400);}
const posterCache={};
function wikiPoster(title,year){const k=title+'|'+year;if(posterCache[k]!==undefined)return Promise.resolve(posterCache[k]);
  const tries=[['cs',title+' '+year+' film'],['en',title+' '+year+' film'],['cs',title+' film']];
  let p=Promise.resolve(null);
  tries.forEach(([lang,term])=>{p=p.then(r=>{if(r)return r;return fetch(`https://${lang}.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(term)}&gsrlimit=1&prop=pageimages&piprop=thumbnail&pithumbsize=400&pilicense=any&format=json&origin=*`).then(x=>x.json()).then(j=>{const pg=j&&j.query&&j.query.pages;const o=pg&&Object.values(pg)[0];return (o&&o.thumbnail&&o.thumbnail.source)||null;}).catch(()=>null);});});
  return p.then(r=>{posterCache[k]=r;return r;});
}
function qid(uri){return uri.split('/').pop();}

const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){io.unobserve(e.target);const d=e.target.dataset;wikiPoster(d.title,d.year).then(src=>{if(src){e.target.src=src;e.target.onload=()=>e.target.classList.add('on');}else if(d.fallback){e.target.src=d.fallback;e.target.onload=()=>e.target.classList.add('on');}});}});},{rootMargin:'400px'});

function mkTitle(m){let t=(m.lc&&m.lc.value)||(m.le&&m.le.value)||(m.cn&&m.cn.value)||(m.en&&m.en.value)||qid(m.film.value);return t.replace(/\s*\([^)]*\)\s*$/,x=>/film|seri[aá]l|\d{4}/i.test(x)?'':x).trim();}
function card(m){
  const id=qid(m.film.value), title=mkTitle(m), year=m.year?m.year.value:'', imdb=m.imdbid?m.imdbid.value:'';
  const fb=m.img?commons(m.img.value,400):'';
  return `<div class="card" onclick='openM(${JSON.stringify({id,title,year,imdb,fb}).replace(/'/g,"&#39;")})'>
    <div class="poster"><span class="ph">🎬</span><img data-title="${title.replace(/"/g,'&quot;')}" data-year="${year}" data-fallback="${fb}" alt=""></div>
    <div class="cbody"><div class="ct">${title}</div><div class="cy">${year||'—'}</div></div></div>`;
}
function attachImgs(){document.querySelectorAll('.poster img:not([data-obs])').forEach(i=>{i.dataset.obs=1;io.observe(i);});}

function load(reset){
  if(reset){state.page=0;state.items=[];state.seen={};el('grid').innerHTML='';}
  el('loading').style.display='block';el('empty').style.display='none';el('moreWrap').style.display='none';
  sparql(buildQuery()).then(j=>{
    el('loading').style.display='none';
    let rows=(j.results.bindings||[]).filter(b=>{const id=qid(b.film.value);if(state.seen[id])return false;state.seen[id]=1;return true;});
    if(el('q').value.trim()){const s=el('fsort').value;if(s==='new')rows.sort((a,b)=>(b.year?+b.year.value:0)-(a.year?+a.year.value:0));else if(s==='old')rows.sort((a,b)=>(a.year?+a.year.value:9999)-(b.year?+b.year.value:9999));}
    state.items=state.items.concat(rows);
    el('grid').insertAdjacentHTML('beforeend',rows.map(card).join(''));
    attachImgs();
    el('count').textContent=(el('q').value.trim()?('Výsledky: „'+el('q').value.trim()+'“'):'Nejznámější filmy')+' · '+state.items.length;
    el('empty').style.display=state.items.length?'none':'block';if(!state.items.length)el('empty').textContent='Nic nenalezeno – zkus jiný výraz nebo filtr.';
    el('moreWrap').style.display=(!el('q').value.trim()&&rows.length>=state.perPage)?'block':'none';
  }).catch(e=>{el('loading').style.display='none';el('empty').style.display='block';el('empty').textContent='Chyba načítání (Wikidata): '+e.message+' — zkus to za chvíli znovu.';});
}

let tm;el('q').addEventListener('input',()=>{clearTimeout(tm);tm=setTimeout(()=>load(true),400);});
['fgenre','fdecade','fsort'].forEach(id=>el(id).addEventListener('change',()=>load(true)));
el('reset').onclick=()=>{el('q').value='';el('fgenre').value='';el('fdecade').value='';el('fsort').value='links';load(true);};
el('moreBtn').onclick=()=>{state.page++;load(false);};

function openM(d){
  el('modal').innerHTML=`<div style="padding:40px;text-align:center;color:var(--mut)">Načítám detail…</div>`;el('ov').classList.add('on');
  const detQ=`SELECT (GROUP_CONCAT(DISTINCT ?dirL;separator=", ") AS ?dir) (GROUP_CONCAT(DISTINCT ?genL;separator=", ") AS ?genres) (GROUP_CONCAT(DISTINCT ?couL;separator=", ") AS ?countries) (SAMPLE(?dur) AS ?runtime) (SAMPLE(?orig) AS ?orig) (SAMPLE(?img) AS ?img) (SAMPLE(?cs) AS ?cstitle) WHERE { VALUES ?film {wd:${d.id}}
    OPTIONAL{?film wdt:P57 ?dir. ?dir rdfs:label ?dirL. FILTER(LANG(?dirL)="en")}
    OPTIONAL{?film wdt:P136 ?gen. ?gen rdfs:label ?genL. FILTER(LANG(?genL)="cs")}
    OPTIONAL{?film wdt:P495 ?cou. ?cou rdfs:label ?couL. FILTER(LANG(?couL)="cs")}
    OPTIONAL{?film wdt:P2047 ?dur.} OPTIONAL{?film wdt:P1476 ?orig.} OPTIONAL{?film wdt:P18 ?img.}
    OPTIONAL{?art schema:about ?film ; schema:isPartOf <https://cs.wikipedia.org/> ; schema:name ?cs.} }`;
  const castQ=`SELECT DISTINCT ?actorLabel ?img WHERE { wd:${d.id} wdt:P161 ?actor. ?actor rdfs:label ?actorLabel. FILTER(LANG(?actorLabel) IN("cs","en")) OPTIONAL{?actor wdt:P18 ?img.} } LIMIT 30`;
  Promise.all([sparql(detQ).catch(()=>null),sparql(castQ).catch(()=>null),
    wikiPoster(d.title,d.year)
  ]).then(([det,castR,poster])=>{
    const b=det&&det.results.bindings[0]||{};
    const dir=b.dir&&b.dir.value, genres=b.genres&&b.genres.value, countries=b.countries&&b.countries.value, runtime=b.runtime&&Math.round(+b.runtime.value), orig=b.orig&&b.orig.value;
    const csTitle=(b.cstitle&&b.cstitle.value)||(d.title+' (film)');
    const pimg=poster||(b.img?commons(b.img.value,500):'')||(d.fb||'');
    return fetch('https://cs.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(csTitle)).then(r=>r.ok?r.json():null).catch(()=>null).then(sum=>({b,dir,genres,countries,runtime,orig,pimg,castR,sum,csTitle}));
  }).then(({b,dir,genres,countries,runtime,orig,pimg,castR,sum})=>{
    let seen={};const cast=((castR&&castR.results.bindings)||[]).filter(c=>{const n=c.actorLabel.value;if(seen[n])return false;seen[n]=1;return true;}).slice(0,12).map(c=>{
      const p=c.img?commons(c.img.value,185):'';
      return `<div class="actor">${p?`<img class="ap" src="${p}" loading="lazy" alt="">`:`<div class="ap" style="display:flex;align-items:center;justify-content:center;font-size:22px;opacity:.4">👤</div>`}<div class="an">${c.actorLabel.value}</div></div>`;}).join('');
    const plot=(sum&&sum.extract)||'';
    const eq=encodeURIComponent(d.title);
    const links=[['ČSFD','https://www.csfd.cz/hledat/?q='+eq],['Kinobox','https://www.kinobox.cz/hledani?query='+eq],['IMDb',d.imdb?('https://www.imdb.com/title/'+d.imdb+'/'):('https://www.imdb.com/find/?q='+eq)],['Kde sledovat','https://www.justwatch.com/cz/Hledat?q='+eq],['Wikipedie','https://cs.wikipedia.org/wiki/'+encodeURIComponent(d.title)]];
    const chips=[genres?genres.split(', ').slice(0,4):[]].flat().map(g=>`<span class="chip">${g}</span>`).join('');
    el('modal').innerHTML=`<div class="mtop"><div class="mp">${pimg?`<img src="${pimg}" alt="">`:'<span class="ph">🎬</span>'}</div>
      <div class="mhead"><button class="close" onclick="closeM()">×</button>
        <div class="mt">${d.title}</div>
        <div class="morig">${orig&&orig!==d.title?orig+' · ':''}${d.year||''}${runtime?' · '+runtime+' min':''}${countries?' · '+countries:''}</div>
        <div class="chips">${chips}</div>
        <div class="kv">${dir?`<div><span class="k">Režie:</span> ${dir}</div>`:''}${genres?`<div><span class="k">Žánr:</span> ${genres}</div>`:''}</div>
      </div></div>
      <div class="mbody">
        ${plot?`<div class="desc">${plot}</div>`:'<div class="desc" style="color:var(--mut)">Český popis na Wikipedii nenalezen — koukni na odkazy níže.</div>'}
        ${cast?`<div class="sec-t">Obsazení</div><div class="cast">${cast}</div>`:''}
        <div class="sec-t">Hodnocení &amp; odkazy</div><div class="links">${links.map(l=>`<a class="lnk" href="${l[1]}" target="_blank" rel="noopener">${l[0]}</a>`).join('')}</div>
      </div>`;
  });
}
function closeM(){el('ov').classList.remove('on');}
el('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeM();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});

load(true);
</script>
</body>
</html>
